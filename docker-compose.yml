version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rent-car-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rent_car
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./core/src/main/resources/db/INITIAL_DB_CREATION.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./core/src/main/resources/db/scripts/004_LUXEDRIVE_SCHEMA.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
